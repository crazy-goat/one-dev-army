{{define "content"}}
<div class="wizard-step">
  <h2>Task Breakdown</h2>
  
  <p class="subtitle">Review the tasks that will be created:</p>
  
  <div class="task-list">
    {{range .Tasks}}
    <div class="task-card">
      <div class="task-header">
        <span class="task-title">{{.Title}}</span>
        <div class="task-meta">
          <span class="badge priority-{{.Priority}}">{{.Priority}}</span>
          <span class="badge complexity-{{.Complexity}}">{{.Complexity}}</span>
        </div>
      </div>
      <p class="task-description">{{.Description}}</p>
    </div>
    {{end}}
  </div>
  
  <form hx-post="/wizard/create{{if .IsPage}}?page=1{{end}}" hx-target="#wizard-content" hx-swap="innerHTML">
    <input type="hidden" name="session_id" value="{{.SessionID}}">
    {{if .IsPage}}<input type="hidden" name="page" value="1">{{end}}
    
    {{if .SprintName}}
    <div class="sprint-option">
      <label class="sprint-checkbox">
        <input type="checkbox" name="add_to_sprint" value="1" checked>
        <span class="sprint-checkbox-label">Add to current sprint <strong>{{.SprintName}}</strong></span>
      </label>
    </div>
    {{end}}
    
    <div class="form-actions">
      {{if .IsPage}}
      <a href="/" class="btn">Cancel</a>
      {{else}}
      <button type="button" class="btn" onclick="closeWizardModal()">Cancel</button>
      {{end}}
      <div class="nav-buttons">
        <button type="button" class="btn" hx-get="/wizard/refine?session_id={{.SessionID}}{{if .IsPage}}&amp;page=1{{end}}" hx-target="#wizard-content">
          ← Back
        </button>
        <button type="submit" class="btn btn-success">
          <span class="spinner" style="display:none;">⏳</span>
          <span class="label">Create GitHub Issues</span>
        </button>
      </div>
    </div>
  </form>
  
  <div id="wizard-logs" hx-get="/wizard/logs/{{.SessionID}}" hx-trigger="every 1s" hx-swap="innerHTML" hx-headers='{"X-Expected-Step": "breakdown"}' style="margin-top: 1rem; max-height: 200px; overflow-y: auto;"></div>
</div>

{{template "wizard-steps" .}}
{{end}}
