{{template "layout" .}}
{{define "content"}}
<div class="wizard-page-container">
  <div class="wizard-page-header">
    <div class="step-indicator">
      <div class="step {{if eq .CurrentStep 1}}active{{end}} {{if gt .CurrentStep 1}}completed{{end}}">
        <span class="step-number">1</span>
        <span class="step-label">Idea</span>
      </div>
      <div class="step-connector"></div>
      <div class="step {{if eq .CurrentStep 2}}active{{end}} {{if gt .CurrentStep 2}}completed{{end}}">
        <span class="step-number">2</span>
        <span class="step-label">Refine</span>
      </div>
      <div class="step-connector"></div>
      <div class="step {{if eq .CurrentStep 3}}active{{end}} {{if gt .CurrentStep 3}}completed{{end}}">
        <span class="step-number">3</span>
        <span class="step-label">Breakdown</span>
      </div>
      <div class="step-connector"></div>
      <div class="step {{if eq .CurrentStep 4}}active{{end}}">
        <span class="step-number">4</span>
        <span class="step-label">Create</span>
      </div>
    </div>
    <a href="/" class="wizard-close-btn" aria-label="Close wizard">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 5L5 15M5 5L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </a>
  </div>
  
  <div id="wizard-content" class="wizard-page-content">
    {{template "wizard-step-content" .}}
  </div>
</div>

<style>
.wizard-page-container {
  max-width: 900px;
  margin: 0 auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.wizard-page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  gap: 1rem;
}

.step-indicator {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex: 1;
}

.step {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  opacity: 0.5;
  transition: opacity 0.2s;
}

.step.active {
  opacity: 1;
}

.step.completed {
  opacity: 0.8;
}

.step-number {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--border);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  font-weight: 600;
  transition: background 0.2s, color 0.2s;
}

.step.active .step-number {
  background: var(--accent);
  color: #fff;
}

.step.completed .step-number {
  background: var(--green);
  color: #fff;
}

.step-label {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text);
}

.step-connector {
  width: 24px;
  height: 2px;
  background: var(--border);
  margin: 0 0.25rem;
}

.wizard-close-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 0.5rem;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s, background 0.2s;
  text-decoration: none;
}

.wizard-close-btn:hover {
  color: var(--text);
  background: var(--border);
  text-decoration: none;
}

.wizard-page-content {
  padding: 1.5rem;
}

/* Responsive adjustments */
@media (max-width: 640px) {
  .wizard-page-header {
    padding: 1rem;
  }
  
  .step-label {
    display: none;
  }
  
  .step-connector {
    width: 16px;
  }
  
  .wizard-page-content {
    padding: 1rem;
  }
}
</style>
{{end}}
