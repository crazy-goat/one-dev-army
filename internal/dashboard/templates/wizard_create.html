{{template "wizard_modal" .}}
{{define "wizard_content"}}
<div class="wizard-step-content">
  <h2>✅ Issues Created Successfully</h2>
  <p class="step-description">The following GitHub issues have been created:</p>
  
  <div class="issue-list">
    {{range .CreatedIssues}}
    <div class="issue-card">
      <a href="{{.URL}}" target="blank" class="issue-link">
        <span class="issue-number">#{{.Number}}</span>
        <span class="issue-title">{{.Title}}</span>
      </a>
    </div>
    {{end}}
  </div>
  
  <div class="form-actions">
    <button type="button" class="btn" hx-post="/wizard/cancel" hx-target="#wizard-modal" hx-swap="delete">Close Wizard</button>
    <a href="/backlog" class="btn btn-primary">View Backlog →</a>
  </div>
</div>

<style>
.wizard-step-content { max-width: 100%; }
.step-description { color: var(--muted); margin-bottom: 1rem; font-size: .9rem; }
.issue-list { display: flex; flex-direction: column; gap: 0.5rem; margin: 1rem 0; }
.issue-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.75rem 1rem;
}
.issue-link {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.issue-number {
  color: var(--accent);
  font-weight: 600;
}
.issue-title {
  color: var(--text);
}
.form-actions { display: flex; justify-content: space-between; gap: 0.5rem; margin-top: 1.5rem; }
</style>
{{end}}
