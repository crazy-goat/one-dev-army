{{define "workers.html"}}
<style>
.worker-grid{display:flex;gap:.75rem;flex-wrap:wrap}
.worker-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.6rem .85rem;min-width:220px;font-size:.85rem}
.worker-card .wk-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem}
.worker-card .wk-id{font-weight:600}
.worker-card .wk-status{font-size:.75rem;padding:.1rem .5rem;border-radius:10px}
.wk-status.idle{background:#1a2332;color:var(--muted)}
.wk-status.working{background:#0d2818;color:var(--green)}
.worker-card .wk-detail{color:var(--muted);font-size:.8rem}
</style>
<div class="worker-grid">
{{range .}}
  <div class="worker-card">
    <div class="wk-header">
      <span class="wk-id">{{.ID}}</span>
      <span class="wk-status {{.Status}}">{{.Status}}</span>
    </div>
    {{if eq .Status "working"}}
    <div class="wk-detail">Task #{{.TaskID}}: {{.Task}}</div>
    <div class="wk-detail">Stage: {{.Stage}} &middot; {{.Elapsed}}</div>
    {{end}}
  </div>
{{else}}
  <p style="color:var(--muted);font-size:.85rem">No workers configured.</p>
{{end}}
</div>
{{end}}
