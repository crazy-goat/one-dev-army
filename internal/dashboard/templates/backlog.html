{{template "layout" .}}
{{define "content"}}
<style>
.backlog-grid{display:grid;grid-template-columns:1fr 350px;gap:1.5rem}
.backlog-list{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem}
.backlog-item{display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;border-bottom:1px solid var(--border);font-size:.85rem}
.backlog-item:last-child{border-bottom:none}
.backlog-item .item-id{color:var(--muted);font-size:.8rem;min-width:2.5rem}
.add-epic{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem}
.add-epic textarea{width:100%;min-height:120px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:.6rem;font-family:inherit;font-size:.85rem;resize:vertical;margin-bottom:.75rem}
.add-epic textarea:focus{outline:none;border-color:var(--accent)}
</style>

<h1>Backlog</h1>

<div class="backlog-grid">
  <div class="backlog-list">
    <h2>Items</h2>
    {{if .Items}}
    {{range .Items}}
    <div class="backlog-item">
      <span class="item-id">#{{.ID}}</span>
      <span>{{.Title}}</span>
    </div>
    {{end}}
    {{else}}
    <p style="color:var(--muted);font-size:.85rem;padding:.5rem">No backlog items.</p>
    {{end}}
  </div>

  <div class="add-epic">
    <h2>Add Epic</h2>
    <form method="post" action="/epic">
      <textarea name="description" placeholder="Describe the epic or idea..."></textarea>
      <button type="submit" class="btn btn-primary">Add Epic</button>
    </form>
  </div>
</div>
{{end}}
