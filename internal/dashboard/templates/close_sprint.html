{{template "layout" .}}
{{define "content"}}
<style>
.close-sprint-wrapper {
  max-width: 1400px;
  margin: 2rem auto;
  padding: 0 2rem;
}

.close-sprint-header {
  text-align: center;
  margin-bottom: 2rem;
}

.close-sprint-header h1 {
  margin-bottom: 0.5rem;
}

.close-sprint-header p {
  color: var(--muted);
  font-size: 0.9rem;
}

.close-sprint-grid {
  display: grid;
  grid-template-columns: 400px 1fr;
  gap: 2rem;
  align-items: stretch;
}

.left-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
}

.right-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  min-height: 400px;
}

.version-display {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  text-align: center;
}

.version-current {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

.version-number {
  font-size: 1.8rem;
  font-weight: 600;
  font-family: monospace;
  color: var(--text);
}

.version-arrow {
  font-size: 1.2rem;
  color: var(--muted);
  margin: 0.5rem 0;
}

.version-new {
  font-size: 1.8rem;
  font-weight: 600;
  font-family: monospace;
  color: var(--accent);
}

.bump-options {
  margin-bottom: 1.5rem;
}

.bump-option {
  display: flex;
  align-items: center;
  padding: 0.875rem;
  margin-bottom: 0.5rem;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.bump-option:hover {
  border-color: var(--accent);
}

.bump-option input[type="radio"] {
  margin-right: 0.75rem;
  width: 1.1rem;
  height: 1.1rem;
  accent-color: var(--accent);
}

.bump-option-label {
  flex: 1;
  font-weight: 500;
  font-size: 0.9rem;
}

.bump-option-desc {
  font-size: 0.75rem;
  color: var(--muted);
}

.bump-option.selected {
  border-color: var(--accent);
  background: rgba(var(--accent-rgb), 0.05);
}

.error-message {
  background: rgba(231, 76, 60, 0.1);
  border: 1px solid var(--red);
  color: var(--red);
  padding: 1rem;
  border-radius: 8px;
  margin-bottom: 1.5rem;
  text-align: center;
}

.actions {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
}

.actions .btn {
  padding: 0.625rem 1.5rem;
  font-size: 0.9rem;
}

.preview-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}

.preview-header h3 {
  margin: 0;
  color: var(--accent);
  font-size: 1.1rem;
}

.preview-tag {
  font-size: 0.8rem;
  color: var(--muted);
  font-family: monospace;
  background: var(--bg);
  padding: 0.25rem 0.5rem;
  border-radius: 4px;
}

.preview-content {
  font-size: 0.9rem;
  line-height: 1.6;
}

.preview-content h1,
.preview-content h2,
.preview-content h3,
.preview-content h4 {
  margin: 1.5rem 0 0.75rem 0;
  color: var(--text);
}

.preview-content h1:first-child,
.preview-content h2:first-child,
.preview-content h3:first-child,
.preview-content h4:first-child {
  margin-top: 0;
}

.preview-content h1 { font-size: 1.3rem; }
.preview-content h2 { font-size: 1.15rem; }
.preview-content h3 { font-size: 1rem; }
.preview-content h4 { font-size: 0.95rem; }

.preview-content ul,
.preview-content ol {
  margin: 0.5rem 0;
  padding-left: 1.5rem;
}

.preview-content li {
  margin-bottom: 0.5rem;
}

.preview-content p {
  margin: 0.75rem 0;
}

.preview-content strong {
  color: var(--accent);
  font-weight: 600;
}

.preview-content code {
  background: var(--bg);
  padding: 0.2rem 0.4rem;
  border-radius: 4px;
  font-family: monospace;
  font-size: 0.85em;
}

.preview-content pre {
  background: var(--bg);
  padding: 1rem;
  border-radius: 8px;
  overflow-x: auto;
  margin: 0.75rem 0;
}

.preview-content pre code {
  background: none;
  padding: 0;
}

.preview-content blockquote {
  border-left: 3px solid var(--accent);
  margin: 0.75rem 0;
  padding-left: 1rem;
  color: var(--muted);
}

.preview-content a {
  color: var(--accent);
  text-decoration: none;
}

.preview-content a:hover {
  text-decoration: underline;
}

.preview-content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.5rem 0;
}

.preview-title-input {
  width: 100%;
  padding: 0.75rem;
  font-size: 1.1rem;
  font-weight: 600;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  margin-bottom: 1rem;
  outline: none;
  transition: border-color 0.2s;
}

.preview-title-input:focus {
  border-color: var(--accent);
}

.preview-body-textarea {
  width: 100%;
  min-height: 250px;
  padding: 0.75rem;
  font-size: 0.9rem;
  font-family: monospace;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
  line-height: 1.5;
}

.preview-body-textarea:focus {
  border-color: var(--accent);
}

.preview-edit-label {
  font-size: 0.75rem;
  color: var(--muted);
  margin-bottom: 0.25rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.markdown-raw {
  display: none;
}

.preview-footer {
  margin-top: 1.5rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--muted);
  text-align: center;
}

.loading-spinner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 300px;
  color: var(--muted);
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 1rem;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 300px;
  color: var(--muted);
  text-align: center;
}

.empty-state-icon {
  font-size: 3rem;
  margin-bottom: 1rem;
  opacity: 0.5;
}

@media (max-width: 900px) {
  .close-sprint-grid {
    grid-template-columns: 1fr;
  }
}
</style>

<div class="close-sprint-wrapper">
  <div class="close-sprint-header">
    <h1>Close Sprint & Release</h1>
    <p>Select the version bump type and review the generated release notes</p>
  </div>

  {{if .Error}}
  <div class="error-message">
    {{.Error}}
  </div>
  {{end}}

  <div class="close-sprint-grid">
    <div class="left-panel">
      <div class="version-display">
        <div class="version-current">Current Version</div>
        <div class="version-number">{{.CurrentVersion}}</div>
        <div class="version-arrow">↓</div>
        <div class="version-current">New Version</div>
        <div class="version-new" id="new-version">{{.NewVersion}}</div>
      </div>

      <form method="post" action="/api/sprint/close/confirm" id="version-form">
        <input type="hidden" name="current_version" value="{{.CurrentVersion}}">
        <input type="hidden" name="release_title" id="release-title-hidden">
        <input type="hidden" name="release_body" id="release-body-hidden">

        <div class="bump-options">
          <label class="bump-option {{if eq .BumpType "major"}}selected{{end}}">
            <input type="radio" name="bump_type" value="major" {{if eq .BumpType "major"}}checked{{end}} 
                   onchange="updateVersion('major')" 
                   hx-post="/api/sprint/close/preview" 
                   hx-target="#preview-container" 
                   hx-swap="innerHTML" 
                   hx-include="#version-form">
            <div>
              <div class="bump-option-label">Major Release</div>
              <div class="bump-option-desc">Breaking changes, incompatible API modifications</div>
            </div>
          </label>

          <label class="bump-option {{if eq .BumpType "minor"}}selected{{end}}">
            <input type="radio" name="bump_type" value="minor" {{if eq .BumpType "minor"}}checked{{end}} 
                   onchange="updateVersion('minor')"
                   hx-post="/api/sprint/close/preview" 
                   hx-target="#preview-container" 
                   hx-swap="innerHTML" 
                   hx-include="#version-form">
            <div>
              <div class="bump-option-label">Minor Release</div>
              <div class="bump-option-desc">New features, backwards-compatible additions</div>
            </div>
          </label>

          <label class="bump-option {{if eq .BumpType "patch"}}selected{{end}}">
            <input type="radio" name="bump_type" value="patch" {{if eq .BumpType "patch"}}checked{{end}} 
                   onchange="updateVersion('patch')"
                   hx-post="/api/sprint/close/preview" 
                   hx-target="#preview-container" 
                   hx-swap="innerHTML" 
                   hx-include="#version-form">
            <div>
              <div class="bump-option-label">Patch Release</div>
              <div class="bump-option-desc">Bug fixes, backwards-compatible corrections</div>
            </div>
          </label>
        </div>

        <div class="actions">
          <a href="/" class="btn">Cancel</a>
          <button type="submit" class="btn btn-success">Create Tag & Close Sprint</button>
        </div>
      </form>
    </div>

    <div class="right-panel" id="preview-container">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <div>Generating release notes with LLM...</div>
      </div>
    </div>
  </div>
</div>

<script>
const currentVersion = '{{.CurrentVersion}}';

function parseVersion(v) {
  const parts = v.split('.');
  return {
    major: parseInt(parts[0]),
    minor: parseInt(parts[1]),
    patch: parseInt(parts[2])
  };
}

function bumpVersion(type) {
  const v = parseVersion(currentVersion);
  switch(type) {
    case 'major':
      return `${v.major + 1}.0.0`;
    case 'minor':
      return `${v.major}.${v.minor + 1}.0`;
    case 'patch':
      return `${v.major}.${v.minor}.${v.patch + 1}`;
    default:
      return currentVersion;
  }
}

function updateVersion(type) {
  const newVersion = bumpVersion(type);
  document.getElementById('new-version').textContent = newVersion;

  // Update selected styling
  document.querySelectorAll('.bump-option').forEach(opt => {
    opt.classList.remove('selected');
  });
  event.target.closest('.bump-option').classList.add('selected');
}

// Auto-load preview on page load
document.addEventListener('DOMContentLoaded', function() {
  const checkedRadio = document.querySelector('input[name="bump_type"]:checked');
  const targetRadio = checkedRadio || document.querySelector('input[value="patch"]');
  
  if (targetRadio) {
    if (!checkedRadio) {
      targetRadio.checked = true;
      targetRadio.closest('.bump-option').classList.add('selected');
    }
    
    // Trigger HTMX request manually
    htmx.ajax('POST', '/api/sprint/close/preview', {
      target: '#preview-container',
      swap: 'innerHTML',
      values: {
        current_version: currentVersion,
        bump_type: targetRadio.value
      }
    });
  }
});

function syncReleaseFields() {
  const titleInput = document.getElementById('release-title-input');
  const bodyInput = document.getElementById('release-body-input');
  const titleHidden = document.getElementById('release-title-hidden');
  const bodyHidden = document.getElementById('release-body-hidden');
  
  if (titleInput && titleHidden) {
    titleHidden.value = titleInput.value;
  }
  if (bodyInput && bodyHidden) {
    bodyHidden.value = bodyInput.value;
  }
}

document.getElementById('version-form').addEventListener('submit', function() {
  syncReleaseFields();
});
</script>
{{end}}
