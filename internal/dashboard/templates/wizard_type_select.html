{{define "wizard-step-content"}}
<div class="wizard-step-content">
  <h1>What would you like to create?</h1>
  <p class="wizard-subtitle">Select the type of issue you want to create</p>
  
  <div class="type-selector">
    <form hx-post="/wizard/select-type{{if .IsPage}}?page=1{{end}}" hx-target="#wizard-content" hx-swap="innerHTML">
      <input type="hidden" name="session_id" value="{{.SessionID}}">
      {{if .IsPage}}<input type="hidden" name="page" value="1">{{end}}
      
      <div class="type-cards">
        <label class="type-card feature-card">
          <input type="radio" name="wizard_type" value="feature" required>
          <div class="card-content">
            <div class="card-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h3>New Feature</h3>
            <p>Create a new feature with AI-powered refinement and optional task breakdown</p>
            <ul class="feature-list">
              <li>AI refinement of your idea</li>
              <li>Automatic task breakdown</li>
              <li>Epic + sub-task structure</li>
            </ul>
          </div>
        </label>
        
        <label class="type-card bug-card">
          <input type="radio" name="wizard_type" value="bug" required>
          <div class="card-content">
            <div class="card-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 8V12M12 16H12.01M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h3>Bug Report</h3>
            <p>Report a bug with AI-assisted description refinement</p>
            <ul class="feature-list">
              <li>AI refinement of bug description</li>
              <li>Structured bug report format</li>
              <li>Single issue creation</li>
            </ul>
          </div>
        </label>
      </div>
      
      <div class="form-actions">
        {{if .IsPage}}
        <a href="/" class="btn">Cancel</a>
        {{else}}
        <button type="button" class="btn" onclick="closeWizardModal()">Cancel</button>
        {{end}}
        <button type="submit" class="btn btn-primary">
          <span class="spinner" style="display:none;">⏳</span>
          <span class="label">Continue</span>
        </button>
      </div>
    </form>
  </div>
</div>

<style>
.wizard-step-content { max-width: 800px; margin: 0 auto; }
.wizard-subtitle { color: var(--muted); margin-bottom: 2rem; text-align: center; }

.type-selector { margin-top: 1.5rem; }

.type-cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.5rem;
  margin-bottom: 2rem;
}

.type-card {
  position: relative;
  cursor: pointer;
  border: 2px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  transition: all 0.2s ease;
  overflow: hidden;
}

.type-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
}

.type-card input[type="radio"] {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}

.type-card input[type="radio"]:checked + .card-content {
  background: rgba(88, 166, 255, 0.1);
  border-color: var(--accent);
}

.type-card input[type="radio"]:checked + .card-content .card-icon {
  color: var(--accent);
}

.card-content {
  padding: 2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  height: 100%;
}

.card-icon {
  color: var(--muted);
  margin-bottom: 1rem;
  transition: color 0.2s;
}

.type-card h3 {
  font-size: 1.25rem;
  margin-bottom: 0.75rem;
  color: var(--text);
}

.type-card p {
  color: var(--muted);
  font-size: 0.9rem;
  margin-bottom: 1rem;
  line-height: 1.5;
}

.feature-list {
  list-style: none;
  padding: 0;
  margin: 0;
  text-align: left;
  width: 100%;
}

.feature-list li {
  color: var(--muted);
  font-size: 0.85rem;
  padding: 0.25rem 0;
  padding-left: 1.25rem;
  position: relative;
}

.feature-list li::before {
  content: "✓";
  position: absolute;
  left: 0;
  color: var(--green);
  font-weight: bold;
}

.form-actions { 
  display: flex; 
  justify-content: space-between; 
  gap: 0.5rem; 
  margin-top: 1.5rem; 
}

.htmx-request .spinner { display: inline !important; }
.htmx-request .label { display: none; }

/* Responsive adjustments */
@media (max-width: 640px) {
  .type-cards {
    grid-template-columns: 1fr;
    gap: 1rem;
  }
  
  .card-content {
    padding: 1.5rem;
  }
}
</style>
{{end}}

{{define "content"}}
{{template "wizard-step-content" .}}
{{end}}
