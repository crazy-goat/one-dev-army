{{define "content"}}
<div id="wizard-modal-backdrop" class="wizard-modal-backdrop" onclick="if(event.target === this) closeWizardModal()">
  <div class="wizard-modal-container" role="dialog" aria-modal="true" aria-labelledby="wizard-title">
    <div class="wizard-modal-header">
      <div class="step-indicator">
        <div class="step {{if eq .CurrentStep 1}}active{{end}} {{if gt .CurrentStep 1}}completed{{end}}">
          <span class="step-number">1</span>
          <span class="step-label">Type</span>
        </div>
        <div class="step-connector"></div>
        <div class="step {{if eq .CurrentStep 2}}active{{end}} {{if gt .CurrentStep 2}}completed{{end}}">
          <span class="step-number">2</span>
          <span class="step-label">Idea</span>
        </div>
        <div class="step-connector"></div>
        <div class="step {{if eq .CurrentStep 3}}active{{end}} {{if gt .CurrentStep 3}}completed{{end}}">
          <span class="step-number">3</span>
          <span class="step-label">Refine</span>
        </div>
        {{if .ShowBreakdownStep}}
        <div class="step-connector"></div>
        <div class="step {{if eq .CurrentStep 4}}active{{end}} {{if gt .CurrentStep 4}}completed{{end}}">
          <span class="step-number">4</span>
          <span class="step-label">Breakdown</span>
        </div>
        <div class="step-connector"></div>
        <div class="step {{if eq .CurrentStep 5}}active{{end}}">
          <span class="step-number">5</span>
          <span class="step-label">Create</span>
        </div>
        {{else}}
        <div class="step-connector"></div>
        <div class="step {{if eq .CurrentStep 4}}active{{end}}">
          <span class="step-number">4</span>
          <span class="step-label">Create</span>
        </div>
        {{end}}
      </div>
      <button type="button" class="wizard-close-btn" onclick="closeWizardModal()" aria-label="Close wizard">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 5L5 15M5 5L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    
    <div id="wizard-modal-content" class="wizard-modal-content">
      {{template "wizard-step-content" .}}
    </div>
  </div>
</div>

<script>
function closeWizardModal() {
  const backdrop = document.getElementById('wizard-modal-backdrop');
  if (backdrop) {
    backdrop.remove();
  }
  // Also clear any session if needed
  const sessionId = document.querySelector('input[name="session_id"]')?.value;
  if (sessionId) {
    fetch('/wizard/cancel?session_id=' + encodeURIComponent(sessionId), {method: 'POST'})
      .catch(err => console.error('Failed to cancel wizard:', err));
  }
}

// Close on Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const backdrop = document.getElementById('wizard-modal-backdrop');
    if (backdrop) closeWizardModal();
  }
});
</script>

<style>
.wizard-modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.wizard-modal-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  max-width: 900px;
  width: 100%;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
}

.wizard-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  gap: 1rem;
}

.step-indicator {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex: 1;
}

.step {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  opacity: 0.5;
  transition: opacity 0.2s;
}

.step.active {
  opacity: 1;
}

.step.completed {
  opacity: 0.8;
}

.step-number {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--border);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  font-weight: 600;
  transition: background 0.2s, color 0.2s;
}

.step.active .step-number {
  background: var(--accent);
  color: #fff;
}

.step.completed .step-number {
  background: var(--green);
  color: #fff;
}

.step-label {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text);
}

.step-connector {
  width: 24px;
  height: 2px;
  background: var(--border);
  margin: 0 0.25rem;
}

.wizard-close-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 0.5rem;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s, background 0.2s;
}

.wizard-close-btn:hover {
  color: var(--text);
  background: var(--border);
}

.wizard-modal-content {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
}

/* Responsive adjustments */
@media (max-width: 640px) {
  .wizard-modal-backdrop {
    padding: 1rem;
  }
  
  .wizard-modal-header {
    padding: 1rem;
  }
  
  .step-label {
    display: none;
  }
  
  .step-connector {
    width: 16px;
  }
  
  .wizard-modal-content {
    padding: 1rem;
  }
}
</style>
{{end}}
