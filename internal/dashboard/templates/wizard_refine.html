{{define "content"}}
<div class="wizard-step">
  <h2>Refined Description</h2>
  
  <form id="refine-form" hx-post="/wizard/create{{if .IsPage}}?page=1{{end}}" hx-target="#wizard-content" hx-swap="innerHTML" hx-disabled-elt="button[type='submit']" data-is-page="{{.IsPage}}">
    <input type="hidden" name="session_id" value="{{.SessionID}}">
    {{if .IsPage}}<input type="hidden" name="page" value="1">{{end}}
    
    <div class="form-group">
      <label for="refined_description">Refined Description (edit if needed):</label>
      <textarea id="refined_description" name="refined_description" rows="8">{{.RefinedDescription}}</textarea>
    </div>
    
    {{if eq .Type "feature"}}
    <div class="form-group breakdown-option">
      <label class="breakdown-checkbox">
        <input type="checkbox" name="do_breakdown" value="1">
        <span class="breakdown-checkbox-label">Break down into sub-tasks</span>
      </label>
      <p class="breakdown-hint">Check to create epic with sub-tasks</p>
    </div>
    {{end}}
    
    <div id="refine-error" class="error-message" style="display:none; color: var(--error); margin: 1rem 0;"></div>
    
    <div class="form-actions">
      {{if .IsPage}}
      <a href="/" class="btn">Cancel</a>
      {{else}}
      <button type="button" class="btn" onclick="closeWizardModal()">Cancel</button>
      {{end}}
      <div class="nav-buttons">
        <button type="button" class="btn" hx-get="/wizard/new?type={{.Type}}&amp;session_id={{.SessionID}}{{if .IsPage}}&amp;page=1{{end}}" hx-target="#wizard-content">
          ← Back
        </button>
        <button type="button" class="btn btn-secondary" hx-post="/wizard/refine{{if .IsPage}}?page=1{{end}}" hx-target="#wizard-content" hx-disabled-elt="button[type='submit']" hx-vals='{"current_description": "{{.RefinedDescription}}"}'>
          <span class="spinner" style="display:none;">⏳</span>
          <span class="label">Refine Again</span>
        </button>
        <button type="submit" class="btn btn-primary">
          <span class="spinner" style="display:none;">⏳</span>
          <span class="label">Accept &amp; Continue</span>
        </button>
      </div>
    </div>
  </form>
  
  <div id="wizard-logs" hx-get="/wizard/logs/{{.SessionID}}" hx-trigger="every 1s" hx-swap="innerHTML" hx-headers='{"X-Expected-Step": "refine"}' style="margin-top: 1rem; max-height: 200px; overflow-y: auto;"></div>
</div>

<style>
.wizard-step { max-width: 800px; margin: 0 auto; }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; margin-bottom: 0.5rem; color: var(--muted); }
.form-group textarea {
  width: 100%;
  padding: 0.75rem;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 0.9rem;
  resize: vertical;
}
.form-group textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.form-actions { display: flex; justify-content: space-between; gap: 0.5rem; margin-top: 1.5rem; }
.nav-buttons { display: flex; gap: 0.5rem; }
.htmx-request .spinner { display: inline !important; }
.htmx-request .label { display: none; }
.btn-secondary { background: var(--surface); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.error-message { padding: 1rem; background: var(--surface); border-radius: 6px; border: 1px solid var(--error); }
.breakdown-option {
  background: rgba(99, 102, 241, 0.05);
  border: 1px solid rgba(99, 102, 241, 0.2);
  border-radius: 6px;
  padding: 0.75rem 1rem;
}
.breakdown-checkbox {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  cursor: pointer;
  user-select: none;
}
.breakdown-checkbox input[type="checkbox"] {
  width: 1rem;
  height: 1rem;
  accent-color: var(--accent);
  cursor: pointer;
}
.breakdown-checkbox-label {
  font-weight: 500;
  color: var(--text);
}
.breakdown-hint {
  margin: 0.25rem 0 0 1.5rem;
  font-size: 0.85rem;
  color: var(--muted);
}
</style>

<script>
(function() {
  const form = document.getElementById('refine-form');
  const checkbox = document.querySelector('input[name="do_breakdown"]');
  
  if (form && checkbox) {
    checkbox.addEventListener('change', function() {
      // When checked (do_breakdown=1), go to breakdown
      // When unchecked, go directly to create
      const isPage = form.getAttribute('data-is-page') === 'true';
      const pageParam = isPage ? '?page=1' : '';
      
      if (this.checked) {
        form.setAttribute('hx-post', '/wizard/breakdown' + pageParam);
      } else {
        form.setAttribute('hx-post', '/wizard/create' + pageParam);
      }
      
      // Re-initialize HTMX on the form to pick up the new attribute
      if (typeof htmx !== 'undefined') {
        htmx.process(form);
      }
    });
    
    // Initialize on page load
    checkbox.dispatchEvent(new Event('change'));
  }
})();
</script>
{{end}}
