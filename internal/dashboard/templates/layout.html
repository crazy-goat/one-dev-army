{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ODA Dashboard</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--orange:#d29922;--purple:#bc8cff}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:2rem}
nav .logo{font-weight:700;font-size:1.1rem;color:var(--text)}
nav .links{display:flex;gap:1rem}
nav .links a{padding:.4rem .8rem;border-radius:6px;color:var(--muted);font-size:.9rem}
nav .links a:hover{color:var(--text);background:var(--border);text-decoration:none}
nav .links a.active{color:var(--text);background:var(--border)}
.container{max-width:1400px;margin:0 auto;padding:1.5rem}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:.85rem;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--border)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9;background:var(--accent)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-success{border-color:var(--green);color:var(--green)}
.btn-success:hover{background:var(--green);color:#fff}
h1{font-size:1.4rem;margin-bottom:1rem}
h2{font-size:1.1rem;margin-bottom:.75rem;color:var(--muted)}

/* Modal Styles */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal-container{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:90%;max-width:700px;max-height:90vh;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg)}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;padding:0;width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .15s}
.modal-close:hover{color:var(--text);background:var(--border)}
.modal-body{padding:1.5rem;overflow-y:auto;max-height:calc(90vh - 80px)}

/* Step Indicator */
.step-indicator{display:flex;align-items:center;gap:.5rem;flex:1}
.step{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;border-radius:6px;transition:all .15s}
.step-number{width:1.75rem;height:1.75rem;border-radius:50%;background:var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600}
.step-label{font-size:.85rem;color:var(--muted);font-weight:500}
.step.active .step-number{background:var(--accent);color:#fff}
.step.active .step-label{color:var(--accent)}
.step.completed .step-number{background:var(--green);color:#fff}
.step.completed .step-label{color:var(--green)}
.step-connector{flex:1;height:2px;background:var(--border);border-radius:1px;max-width:3rem}
.step-connector.completed{background:var(--green)}
</style>
</head>
<body>
<nav>
  <span class="logo">ODA</span>
  <div class="links">
    <a href="/" {{if eq .Active "board"}}class="active"{{end}}>Sprint Board</a>
    <a href="/backlog" {{if eq .Active "backlog"}}class="active"{{end}}>Backlog</a>
    <a href="/costs" {{if eq .Active "costs"}}class="active"{{end}}>Costs</a>
  </div>
</nav>
<div class="container">
{{template "content" .}}
</div>
</body>
</html>{{end}}
