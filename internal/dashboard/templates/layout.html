{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ODA Dashboard</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--orange:#d29922;--purple:#bc8cff}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:2rem}
nav .logo{font-weight:700;font-size:1.1rem;color:var(--text)}
nav .links{display:flex;gap:1rem}
nav .links a{padding:.4rem .8rem;border-radius:6px;color:var(--muted);font-size:.9rem}
nav .links a:hover{color:var(--text);background:var(--border);text-decoration:none}
nav .links a.active{color:var(--text);background:var(--border)}
nav .nav-actions{display:flex;gap:.5rem;margin-left:auto}
.container{margin:0 auto;padding:1.5rem}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:.85rem;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--border)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9;background:var(--accent)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-success{border-color:var(--green);color:var(--green)}
.btn-success:hover{background:var(--green);color:#fff}
h1{font-size:1.4rem;margin-bottom:1rem}
h2{font-size:1.1rem;margin-bottom:.75rem;color:var(--muted)}
.ws-status{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;margin-right:0.5rem}
.ws-status svg{width:16px;height:16px;display:none}
.ws-connected .ws-icon-connected{display:block;color:var(--green)}
.ws-disconnected .ws-icon-disconnected{display:block;color:var(--red)}
footer{background:var(--surface);border-top:1px solid var(--border);padding:.5rem 1.5rem;position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:flex-end;align-items:center;font-size:.8rem;color:var(--muted);z-index:100}
.rate-limit-container{display:flex;align-items:center;gap:.5rem;padding:.25rem .5rem;border-radius:4px;background:var(--bg);border:1px solid var(--border);transition:opacity .2s}
.rate-limit-container:hover{opacity:.8}
.rate-limit-status{font-weight:500}
.rate-limit-reset{color:var(--muted);font-size:.75rem}
.rate-limit-unknown{color:var(--muted);font-style:italic}
</style>
</head>
<body>
<nav>
  <span class="logo">ODA</span>
  <div class="links">
    <a href="/" {{if eq .Active "board"}}class="active"{{end}}>Sprint Board</a>
  </div>
  <div class="nav-actions">
    <a href="/wizard" class="btn btn-primary">+ New Issue</a>
  </div>
</nav>
<div class="container">
{{template "content" .}}
</div>
<footer>
  <span id="ws-status" class="ws-status ws-disconnected" title="Disconnected">
    <svg class="ws-icon-connected" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-9"/></svg>
    <svg class="ws-icon-disconnected" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </span>
  <div hx-get="/api/rate-limit" hx-trigger="load, every 30s" hx-swap="innerHTML">
    <span class="rate-limit-unknown">GitHub API: Loading...</span>
  </div>
</footer>
<script>
(function() {
    const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = wsProtocol + '//' + window.location.host + '/ws';
    let ws = null;
    let reconnectDelay = 1000;
    let reconnectTimer = null;
    let isManualClose = false;
    
    function updateConnectionStatus(connected) {
        const indicator = document.getElementById('ws-status');
        if (indicator) {
            indicator.className = connected ? 'ws-status ws-connected' : 'ws-status ws-disconnected';
            indicator.title = connected ? 'Connected' : 'Disconnected';
        }
    }
    
    function connect() {
        if (ws || isManualClose) return;
        
        try {
            ws = new WebSocket(wsUrl);
            
            ws.onopen = function() {
                console.log('[WebSocket] Connected');
                updateConnectionStatus(true);
                reconnectDelay = 1000; // Reset delay on successful connection
            };
            
            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                console.log('[WebSocket] Received:', msg.type);
                
                if (msg.type === 'issue_update' || msg.type === 'sync_complete') {
                    refreshBoard();
                }
            };
            
            ws.onclose = function() {
                console.log('[WebSocket] Disconnected');
                updateConnectionStatus(false);
                ws = null;
                
                if (!isManualClose) {
                    scheduleReconnect();
                }
            };
            
            ws.onerror = function(error) {
                console.error('[WebSocket] Error:', error);
            };
        } catch (err) {
            console.error('[WebSocket] Failed to create connection:', err);
            scheduleReconnect();
        }
    }
    
    function scheduleReconnect() {
        if (reconnectTimer) return;
        
        console.log(`[WebSocket] Reconnecting in ${reconnectDelay}ms...`);
        reconnectTimer = setTimeout(() => {
            reconnectTimer = null;
            connect();
        }, reconnectDelay);
        
        // Exponential backoff: 1s, 2s, 4s, 8s, max 30s
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    }
    
    function disconnect() {
        isManualClose = true;
        if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
        }
        if (ws) {
            ws.close();
            ws = null;
        }
    }
    
    function refreshBoard() {
        // Use HTMX to refresh board data
        const board = document.getElementById('board-container');
        if (board && typeof htmx !== 'undefined') {
            htmx.trigger(board, 'refresh');
        }
    }
    
    // Expose for global access
    window.WebSocketClient = {
        connect: connect,
        disconnect: disconnect,
        refreshBoard: refreshBoard
    };
    
    // Auto-connect on page load
    document.addEventListener('DOMContentLoaded', connect);
    
    // Cleanup on page unload
    window.addEventListener('beforeunload', disconnect);
})();
</script>
</body>
</html>{{end}}
