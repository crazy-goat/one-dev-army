github:
    repo: crazy-goat/one-dev-army
dashboard:
    port: 8080
workers:
    count: 3
opencode:
    url: http://localhost:4096
    web_port: 8081
tools:
    lint_cmd: ""
    test_cmd: go test ./...
    e2e_cmd: ""
pipeline:
    max_retries: 5
sprint:
    tasks_per_sprint: 10
    auto_start: false
llm:
    setup:
        model: '"Claude Haiku 4.5"'
    planning:
        model: '"Claude Opus 4.6"'
    orchestration:
        model: '"Kimi K2.5"'
    code:
        model: nexos-ai/Kimi K2.5
    code-heavy:
        model: '"Claude Opus 4.6"'
yolo_mode: true
