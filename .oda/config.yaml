github:
    repo: crazy-goat/one-dev-army
dashboard:
    port: 5000
workers:
    count: 3
opencode:
    url: http://localhost:5002
    web_port: 5001
tools:
    lint_cmd: ""
    test_cmd: go test ./...
    e2e_cmd: ""
pipeline:
    max_retries: 5
    check_interval: 10
    check_timeout: 1800
sprint:
    tasks_per_sprint: 10
    auto_start: false
llm:
    setup:
        model: nexos-ai/Claude Haiku 4.5
    planning:
        model: nexos-ai/Kimi K2.5
    orchestration:
        model: '"openrouter/stepfun/step-3.5-flash:free"'
    code:
        model: nexos-ai/Kimi K2.5
    code-heavy:
        model: nexos-ai/Claude Opus 4.6
yolo_mode: false
