github:
    repo: crazy-goat/one-dev-army
dashboard:
    port: 7000
    keep_screen_on: false
workers:
    count: 3
opencode:
    url: http://localhost:6002
    web_port: 6001
tools:
    lint_cmd: golangci-lint run ./...
    test_cmd: go test -race ./...
    e2e_cmd: ""
pipeline:
    max_retries: 5
    check_interval: 10
    check_timeout: 1800
sprint:
    tasks_per_sprint: 10
    auto_start: true
llm:
    setup:
        model: nexos-ai/Claude Haiku 4.5
    planning:
        model: nexos-ai/Kimi K2.5
    orchestration:
        model: openrouter/stepfun/step-3.5-flash:free
    code:
        model: nexos-ai/Claude Opus 4.6
    code-heavy:
        model: nexos-ai/Claude Opus 4.6
yolo_mode: false
