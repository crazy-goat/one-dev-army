github:
    repo: crazy-goat/one-dev-army
dashboard:
    port: 8080
workers:
    count: 3
opencode:
    url: http://localhost:4096
pipeline:
    stages:
        - name: analysis
          llm: nexos-ai/Kimi K2.5
        - name: planning
          llm: nexos-ai/Kimi K2.5
        - name: plan-review
          llm: nexos-ai/Kimi K2.5
        - name: coding
          llm: nexos-ai/Kimi K2.5
        - name: testing
          llm: nexos-ai/Kimi K2.5
        - name: code-review
          llm: nexos-ai/Kimi K2.5
        - name: merge
          manual_approval: true
    max_retries: 5
planning:
    llm: nexos-ai/Kimi K2.5
epic_analysis:
    llm: nexos-ai/Kimi K2.5
sprint:
    tasks_per_sprint: 10

# Multi-model LLM configuration with task-based routing
llm:
    default:
        provider_id: nexos-ai
        model_id: Kimi K2.5
    development:
        strong:
            provider_id: nexos-ai
            model_id: Kimi K2.5
        weak:
            provider_id: nexos-ai
            model_id: Kimi K2.5
    planning:
        strong:
            provider_id: nexos-ai
            model_id: Kimi K2.5
        weak:
            provider_id: nexos-ai
            model_id: Kimi K2.5
    orchestration:
        strong:
            provider_id: nexos-ai
            model_id: Kimi K2.5
        weak:
            provider_id: nexos-ai
            model_id: Kimi K2.5
    setup:
        strong:
            provider_id: nexos-ai
            model_id: Kimi K2.5
        weak:
            provider_id: nexos-ai
            model_id: Kimi K2.5
    routing:
        thresholds:
            development: medium
            planning: low
            orchestration: low
            setup: medium
