github:
    repo: crazy-goat/one-dev-army
    use_projects: false
dashboard:
    port: 8080
workers:
    count: 3
opencode:
    url: http://localhost:4096
tools:
    lint_cmd: ""
    test_cmd: go test ./...
    e2e_cmd: ""
pipeline:
    stages:
        - name: analysis
          llm: nexos-ai/Kimi K2.5
        - name: planning
          llm: nexos-ai/Kimi K2.5
        - name: plan-review
          llm: nexos-ai/Kimi K2.5
        - name: coding
          llm: nexos-ai/Kimi K2.5
        - name: testing
          llm: nexos-ai/Kimi K2.5
        - name: code-review
          llm: nexos-ai/Kimi K2.5
        - name: merge
          manual_approval: true
    max_retries: 5
planning:
    llm: nexos-ai/Kimi K2.5
epic_analysis:
    llm: nexos-ai/Kimi K2.5
sprint:
    tasks_per_sprint: 10

# Multi-model LLM configuration with task-based routing
llm:
    development:
        strong:
            provider: openai
            model: nexos-ai/Kimi K2.5
        weak:
            provider: openai
            model: nexos-ai/Kimi K2.5
    planning:
        strong:
            provider: openai
            model: nexos-ai/Kimi K2.5
        weak:
            provider: openai
            model: nexos-ai/Kimi K2.5
    orchestration:
        strong:
            provider: openai
            model: nexos-ai/Kimi K2.5
        weak:
            provider: openai
            model: nexos-ai/Kimi K2.5
    setup:
        strong:
            provider: openai
            model: nexos-ai/Kimi K2.5
        weak:
            provider: openai
            model: nexos-ai/Kimi K2.5
    default_complexity: medium
    routing_rules:
        complexity_thresholds:
            code_size_threshold: 100
            high_complexity_threshold: 500
            file_count_threshold: 5
        force_strong_for_stages:
            - plan-review
            - code-review
