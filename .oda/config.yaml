github:
    repo: crazy-goat/one-dev-army
    use_projects: false
dashboard:
    port: 8080
workers:
    count: 3
opencode:
    url: http://localhost:4096
    web_port: 8081
tools:
    lint_cmd: ""
    test_cmd: go test ./...
    e2e_cmd: ""
pipeline:
    max_retries: 5
sprint:
    tasks_per_sprint: 10
yolo_mode: false

# Multi-model LLM configuration with task-based routing
llm:
    setup:
        model: nexos-ai/Kimi K2.5
    planning:
        model: nexos-ai/Kimi K2.5
    orchestration:
        model: nexos-ai/Kimi K2.5
    code:
        model: nexos-ai/Kimi K2.5
    code-heavy:
        model: nexos-ai/Kimi K2.5
